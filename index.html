<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans',Arial,sans-serif;background:#f5f5f5;overflow:hidden;height:100vh;height:100dvh;display:flex;flex-direction:column}
#header{flex:0 0 auto;background:linear-gradient(135deg,#1F4E79,#2E86C1);color:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:2000;position:relative}
#header h1{font-size:16px;font-weight:600;line-height:1.2}

#info{position:fixed;top:60px;right:10px;z-index:1200;background:white;border-radius:10px;padding:12px 14px;box-shadow:0 4px 16px rgba(0,0,0,.18);max-width:240px;font-size:12px;line-height:1.5;transition:transform .3s,opacity .3s}
#info.hidden{transform:translateX(300px);opacity:0;pointer-events:none}
#info h3{color:#1F4E79;margin-bottom:4px;font-size:13px;padding-right:24px}
#info .st{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #eee}
#info .st:last-child{border-bottom:none}
#info-close{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:#f0f0f0;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#666;transition:.2s}
#info-close:hover{background:#ddd;color:#333}
#info-reopen{position:fixed;top:60px;right:10px;z-index:1200;background:white;border-radius:10px;padding:8px 12px;box-shadow:0 3px 12px rgba(0,0,0,.15);cursor:pointer;font-size:12px;font-weight:600;color:#1F4E79;display:none;transition:.2s}
#info-reopen:hover{background:#1F4E79;color:white}
#filter-btn{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:1200;background:linear-gradient(135deg,#1F4E79,#2E86C1);color:white;border:none;border-radius:24px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;transition:.2s;white-space:nowrap}
#filter-btn:hover{transform:translateX(-50%) scale(1.05)}
#filter-btn .badge{background:#FF6B35;border-radius:10px;padding:2px 7px;font-size:11px}
#filter-drawer{position:fixed;bottom:0;left:0;right:0;z-index:1300;background:white;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#filter-drawer.open{transform:translateY(0)}
#filter-drawer .handle{width:40px;height:4px;background:#ccc;border-radius:2px;margin:10px auto 6px}
#filter-drawer .drawer-header{padding:4px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee}
#filter-drawer .drawer-header h3{font-size:14px;color:#1F4E79}
#filter-drawer .drawer-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:4px 8px}
#filter-drawer .drawer-body{padding:12px 16px 24px}
.filter-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.filter-chip{display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:20px;border:2px solid #e0e0e0;background:white;cursor:pointer;font-size:12px;transition:.2s;user-select:none;-webkit-tap-highlight-color:transparent}
.filter-chip:active{transform:scale(.95)}
.filter-chip.active{border-color:var(--chip-color,#1F4E79);background:var(--chip-bg,#E3F2FD)}
.filter-chip.off{opacity:.35;border-color:#e0e0e0;background:white}
.filter-chip .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.filter-chip .count{background:#f0f0f0;border-radius:8px;padding:1px 6px;font-size:10px;color:#666}
.filter-chip.ise{border-color:#FF6B35;background:#FFF3E0}
.filter-chip.ise.active{background:#FF6B35;color:white}
.filter-chip.ise.active .count{background:rgba(255,255,255,.3);color:white}
.filter-chip.safety{border-color:#FF9800;background:#FFF3E0;color:#E65100;font-weight:600}
.filter-chip.safety.active{background:#E65100;color:white;border-color:#E65100}
.filter-chip.self-trip{border-color:#8E24AA;background:#F3E5F5}
.filter-chip.self-trip.active{background:#8E24AA;color:white}
.filter-chip.self-trip.active .count{background:rgba(255,255,255,.3);color:white}
#backdrop{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1250;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .3s}

#safety-legend{position:fixed;bottom:70px;left:12px;z-index:1200;background:white;border-radius:10px;padding:12px 14px;box-shadow:0 3px 12px rgba(0,0,0,.15);font-size:12px;display:none;max-width:250px}

.start-icon{background:#E74C3C;color:white;font-weight:bold;font-size:12px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.ise-badge{position:absolute;top:-8px;right:-8px;background:#FF6B35;color:white;font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;border:1.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3);z-index:10;pointer-events:none}
.self-trip-badge{position:absolute;top:-8px;right:-8px;background:#8E24AA;color:white;font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;border:1.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3);z-index:10;pointer-events:none}
/* ── Area nav (quick-jump for novice travelers) ── */

.area-nav-inner{background:white;border-radius:10px;padding:8px;box-shadow:0 3px 12px rgba(0,0,0,.18);display:flex;flex-direction:column;gap:4px;min-width:120px}
.area-title{font-size:11px;font-weight:600;color:#1F4E79;text-align:center;padding:2px 0 4px;border-bottom:1px solid #eee;margin-bottom:2px}
.area-btn{background:white;border:1px solid #e0e0e0;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;text-align:left;transition:.15s;color:#333;font-weight:500;line-height:1.3}
.area-btn:hover{background:#E3F2FD;border-color:#2E86C1}
.area-btn:active{transform:scale(.97)}
.area-btn.all{background:#1F4E79;color:white;border-color:#1F4E79;text-align:center;font-weight:600}
.area-btn.all:hover{background:#2E86C1}
@media(max-width:768px){
  #header{padding:8px 12px}
  #header h1{font-size:13px}
  #header .sub{font-size:10px}
  #header .stats{font-size:9px}
  #info{top:auto;bottom:70px;right:8px;left:8px;max-width:none;font-size:11px;padding:10px 12px}
  #info-reopen{top:auto;bottom:70px;right:8px}
  #filter-btn{bottom:12px;padding:8px 16px;font-size:12px}

@media(max-width:400px){
  #header h1{font-size:12px}

</style>

function hav(a,b,c,d){const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function mi(k){return(k*.621371).toFixed(1)}
function dt(k){return Math.round(k/30*60)}

L.marker([WABH.lat,WABH.lng],{icon:L.divIcon({html:'<div class="start-icon">★</div>',className:'',iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map)

[2,5,10].forEach(km=>{
  const c=km===2?'#27ae60':km===5?'#f39c12':'#e74c3c';
  L.circle([WABH.lat,WABH.lng],{radius:km*1000,fill:false,color:c,weight:1.5,dashArray:'6,4',opacity:.5}).addTo(map);
  const b=45*Math.PI/180,R=6371000,la=WABH.lat*Math.PI/180,lo=WABH.lng*Math.PI/180;
  const la2=Math.asin(Math.sin(la)*Math.cos(km*1000/R)+Math.cos(la)*Math.sin(km*1000/R)*Math.cos(b));
  const lo2=lo+Math.atan2(Math.sin(b)*Math.sin(km*1000/R)*Math.cos(la),Math.cos(km*1000/R)-Math.sin(la)*Math.sin(la2));
  L.marker([la2*180/Math.PI,lo2*180/Math.PI],{icon:L.divIcon({html:'<span style="background:white;padding:1px 5px;border-radius:8px;font-size:10px;font-weight:600;color:'+c+';border:1px solid '+c+'">'+km+'km/'+mi(km)+'mi</span>',className:'',iconSize:[60,16],iconAnchor:[0,8]})}).addTo(map);
});

spots.forEach(s=>{
  const c=cats[s.cat];
  const d=hav(WABH.lat,WABH.lng,s.lat,s.lng);
  const miles=mi(d),mins=dt(d);
  const dl=d<1.5?'🟢 徒歩圏内':d<5?'🟡 短い車移動':'🔴 車で移動';
  let safetyInfo='';
  for(const z of safetyZones){
    if(hav(z.lat,z.lng,s.lat,s.lng)<z.r/1000){
      const rl=z.rating>=5?'⭐安全':z.rating>=4?'✅概ね安全':z.rating>=3?'⚠️普通':'🔴注意';
      safetyInfo='<div style="background:'+(z.rating>=4?'#E8F5E9':z.rating>=3?'#FFF8E1':'#FFEBEE')+';padding:6px 8px;border-radius:5px;margin:4px 0;font-size:11px"><b>安全度: '+rl+'</b><br>'+z.advice+'</div>';
      break;
    }
  }
  const isIse=s.ise_pick||false;
  const isSelfTrip=s.self_trip||false;
  const borderColor=isSelfTrip?'#8E24AA':isIse?'#FF6B35':'white';
  const glowColor=isSelfTrip?'rgba(142,36,170,.6)':isIse?'rgba(255,107,53,.6)':'none';
  const sz=isIse||isSelfTrip?28:24;
  const bw=isIse||isSelfTrip?3:2;
  const icon=L.divIcon({html:'<div style="position:relative"><div style="background:'+c.color+';color:white;width:'+sz+'px;height:'+sz+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:'+(isIse||isSelfTrip?13:12)+'px;border:'+bw+'px solid '+borderColor+';box-shadow:'+(isIse||isSelfTrip?'0 0 0 2px white,0 0 10px '+glowColor+',0 2px 6px rgba(0,0,0,.3)':'0 2px 6px rgba(0,0,0,.3)')+'">'+c.icon+'</div>'+(isIse?'<div class="ise-badge">★</div>':'')+(isSelfTrip?'<div class="self-trip-badge">24</div>':'')+'</div>',className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
  const popup=makePopup(s,c,d,miles,mins,dl,safetyInfo);
  layerGroups[s.cat].addLayer(L.marker([s.lat,s.lng],{icon}).bindPopup(popup));
});

function applyFilters(){
  Object.keys(layerGroups).forEach(cat=>map.removeLayer(layerGroups[cat]));
  if(iseFilter||selfTripFilter){
    Object.keys(cats).forEach(cat=>{
      if(!active[cat])return;
      const lg=L.layerGroup();
      layerGroups[cat].eachLayer(l=>{
        const spot=spots.find(s=>s.lat===l.getLatLng().lat&&s.lng===l.getLatLng().lng);
        if(!spot)return;
        let show=false;
        if(iseFilter&&spot.ise_pick)show=true;
        if(selfTripFilter&&spot.self_trip)show=true;
        if(show)lg.addLayer(l);
      });
      lg.addTo(map);
    });
  } else {
    Object.keys(cats).forEach(cat=>{if(active[cat])map.addLayer(layerGroups[cat])});
  }
}

      '<span>⭐ 伊勢さんおすすめのみ</span>'+

    '</div>'+
    '<div class="filter-chip self-trip" id="chip-self-trip" onclick="toggleSelfTrip()">'+
      '<span>🟣 4/24 セルフトリップ</span>'+
      '<span class="count">'+spots.filter(s=>s.self_trip).length+'</span>'+
    '</div>'+
  '</div>'+
'</div>'+
'<div style="margin-bottom:16px">'+
  '<div style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px">📂 カテゴリー</div>'+
  '<div class="filter-grid" id="cat-chips"></div>'+
'</div>'+
'<div>'+
  '<div style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px">🛡️ 安全マップ</div>'+
  '<div class="filter-grid">'+
    '<div class="filter-chip safety" id="chip-safety" onclick="toggleSafety()">'+
      '<span>⚠️ 安全度エリア表示</span>'+
    '</div>'+
  '</div>'+
'</div>';

const catChips=document.getElementById('cat-chips');
Object.entries(cats).forEach(([cat,cfg])=>{
  const count=spots.filter(s=>s.cat===cat).length;
  const chip=document.createElement('div');
  chip.className='filter-chip active';
  chip.style.setProperty('--chip-color',cfg.color);
  chip.style.setProperty('--chip-bg',cfg.color+'18');
  chip.dataset.cat=cat;
  chip.innerHTML='<span class="dot" style="background:'+cfg.color+'"></span><span>'+cfg.icon+' '+cfg.en+'</span><span class="count">'+count+'</span>';
  chip.onclick=()=>{
    active[cat]=!active[cat];
    chip.classList.toggle('active',active[cat]);
    chip.classList.toggle('off',!active[cat]);
    applyFilters();
  };
  catChips.appendChild(chip);
});

function toggleIse(){
  iseFilter=!iseFilter;
  document.getElementById('chip-ise').classList.toggle('active',iseFilter);
  if(iseFilter){selfTripFilter=false;document.getElementById('chip-self-trip').classList.remove('active')}
  applyFilters();
  document.getElementById('filter-btn').querySelector('.badge').textContent=iseFilter?'⭐ON':selfTripFilter?'🟣ON':'⭐12';
}

function toggleSelfTrip(){
  selfTripFilter=!selfTripFilter;
  document.getElementById('chip-self-trip').classList.toggle('active',selfTripFilter);
  if(selfTripFilter){iseFilter=false;document.getElementById('chip-ise').classList.remove('active')}
  applyFilters();
  document.getElementById('filter-btn').querySelector('.badge').textContent=selfTripFilter?'🟣ON':iseFilter?'⭐ON':'⭐12';
}

function toggleSafety(){
  safetyOn=!safetyOn;
  document.getElementById('chip-safety').classList.toggle('active',safetyOn);
  document.getElementById('safety-legend').style.display=safetyOn?'block':'none';
  safetyOn?map.addLayer(safetyLayer):map.removeLayer(safetyLayer);
}

let touchStartY=0;
document.getElementById('filter-drawer').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
document.getElementById('filter-drawer').addEventListener('touchmove',e=>{
  const dy=e.touches[0].clientY-touchStartY;
  if(dy>60)closeDrawer();
},{passive:true});

if(window.innerWidth<=768){
  setTimeout(()=>toggleInfo(false),4000);
}

// ── Fit map to show all spots on load ──
const allBounds=L.latLngBounds(spots.map(s=>[s.lat,s.lng]));
allBounds.extend([WABH.lat,WABH.lng]);
map.fitBounds(allBounds,{padding:[40,40]});

// ── Quick-jump area nav (helpful for novice LA travelers) ──
const areaNav=L.control({position:'topright'});
areaNav.onAdd=function(){
  const div=L.DomUtil.create('div','area-nav');
  div.innerHTML='<div class="area-nav-inner">'+
    '<div class="area-title">📍 エリア移動</div>'+
    '<button class="area-btn" onclick="jumpTo(34.069,-118.401,14)">🏨 Beverly Hills</button>'+
    '<button class="area-btn" onclick="jumpTo(33.825,-118.34,13)">🇯🇵 Torrance<br><span style=\'font-size:9px;opacity:.7\'>セルフトリップ</span></button>'+
    '<button class="area-btn" onclick="jumpTo(34.05,-118.245,14)">🏙️ DTLA</button>'+
    '<button class="area-btn" onclick="jumpTo(34.02,-118.495,14)">🏖️ Santa Monica</button>'+
    '<button class="area-btn all" onclick="fitAll()">🗺️ 全体表示</button>'+
  '</div>';
  L.DomEvent.disableClickPropagation(div);
  return div;
};
areaNav.addTo(map);

function jumpTo(lat,lng,zoom){map.flyTo([lat,lng],zoom,{duration:0.8})}
function fitAll(){map.flyToBounds(allBounds,{padding:[40,40],duration:0.8})}
</script>
</body>
</html>
