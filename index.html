<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beyond Borders LA — Narrative Trip Spots マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans',Arial,sans-serif;background:#f5f5f5;overflow:hidden;height:100vh;height:100dvh;display:flex;flex-direction:column}

/* ── Header ── */
#header{flex:0 0 auto;background:linear-gradient(135deg,#1F4E79,#2E86C1);color:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:2000;position:relative}
#header h1{font-size:16px;font-weight:600;line-height:1.2}
#header .sub{font-size:11px;opacity:.85;margin-top:2px}
#header .stats{text-align:right;font-size:10px;opacity:.85}

/* ── Map fills remaining space ── */
#map{flex:1 1 auto;position:relative;z-index:1}

/* ── Closable Info Panel (top-right) ── */
#info{position:fixed;top:60px;right:10px;z-index:1200;background:white;border-radius:10px;padding:12px 14px;box-shadow:0 4px 16px rgba(0,0,0,.18);max-width:240px;font-size:12px;line-height:1.5;transition:transform .3s,opacity .3s}
#info.hidden{transform:translateX(300px);opacity:0;pointer-events:none}
#info h3{color:#1F4E79;margin-bottom:4px;font-size:13px;padding-right:24px}
#info .st{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #eee}
#info .st:last-child{border-bottom:none}
#info-close{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:#f0f0f0;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#666;transition:.2s}
#info-close:hover{background:#ddd;color:#333}
#info-reopen{position:fixed;top:60px;right:10px;z-index:1200;background:white;border-radius:10px;padding:8px 12px;box-shadow:0 3px 12px rgba(0,0,0,.15);cursor:pointer;font-size:12px;font-weight:600;color:#1F4E79;display:none;transition:.2s}
#info-reopen:hover{background:#1F4E79;color:white}

/* ── Filter Panel ── */
#filter-btn{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:1200;background:linear-gradient(135deg,#1F4E79,#2E86C1);color:white;border:none;border-radius:24px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;transition:.2s;white-space:nowrap}
#filter-btn:hover{transform:translateX(-50%) scale(1.05)}
#filter-btn .badge{background:#FF6B35;border-radius:10px;padding:2px 7px;font-size:11px}

/* Filter drawer (slides up from bottom) */
#filter-drawer{position:fixed;bottom:0;left:0;right:0;z-index:1300;background:white;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#filter-drawer.open{transform:translateY(0)}
#filter-drawer .handle{width:40px;height:4px;background:#ccc;border-radius:2px;margin:10px auto 6px}
#filter-drawer .drawer-header{padding:4px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee}
#filter-drawer .drawer-header h3{font-size:14px;color:#1F4E79}
#filter-drawer .drawer-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:4px 8px}
#filter-drawer .drawer-body{padding:12px 16px 24px}

/* Filter items in drawer */
.filter-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.filter-chip{display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:20px;border:2px solid #e0e0e0;background:white;cursor:pointer;font-size:12px;transition:.2s;user-select:none;-webkit-tap-highlight-color:transparent}
.filter-chip:active{transform:scale(.95)}
.filter-chip.active{border-color:var(--chip-color,#1F4E79);background:var(--chip-bg,#E3F2FD)}
.filter-chip.off{opacity:.35;border-color:#e0e0e0;background:white}
.filter-chip .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.filter-chip .count{background:#f0f0f0;border-radius:8px;padding:1px 6px;font-size:10px;color:#666}

/* Ise pick special chip */
.filter-chip.ise{border-color:#FF6B35;background:#FFF3E0}
.filter-chip.ise.active{background:#FF6B35;color:white}
.filter-chip.ise.active .count{background:rgba(255,255,255,.3);color:white}

/* Safety chip */
.filter-chip.safety{border-color:#FF9800;background:#FFF3E0;color:#E65100;font-weight:600}
.filter-chip.safety.active{background:#E65100;color:white;border-color:#E65100}

/* ── Backdrop for drawer ── */
#backdrop{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1250;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .3s}
#backdrop.show{opacity:1;pointer-events:auto}

/* ── Safety Legend ── */
#safety-legend{position:fixed;bottom:70px;left:12px;z-index:1200;background:white;border-radius:10px;padding:12px 14px;box-shadow:0 3px 12px rgba(0,0,0,.15);font-size:12px;display:none;max-width:250px}
#safety-legend h4{font-size:13px;margin-bottom:8px;color:#333}
.sl-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.sl-box{width:22px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.1)}

/* ── Marker styles ── */
.start-icon{background:#E74C3C;color:white;font-weight:bold;font-size:12px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.ise-badge{position:absolute;top:-8px;right:-8px;background:#FF6B35;color:white;font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;border:1.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3);z-index:10;pointer-events:none}

/* ── Mobile adjustments ── */
@media(max-width:768px){
  #header{padding:8px 12px}
  #header h1{font-size:13px}
  #header .sub{font-size:10px}
  #header .stats{font-size:9px}
  #info{top:auto;bottom:70px;right:8px;left:8px;max-width:none;font-size:11px;padding:10px 12px}
  #info-reopen{top:auto;bottom:70px;right:8px}
  #filter-btn{bottom:12px;padding:8px 16px;font-size:12px}
  #safety-legend{bottom:60px;left:8px;right:8px;max-width:none}
  .leaflet-popup-content{font-size:12px !important}
}
@media(max-width:400px){
  #header h1{font-size:12px}
  .filter-chip{padding:6px 10px;font-size:11px}
}
</style>
</head>

  {name:"WeHo Community Garden",jp:"ウエストハリウッド・コミュニティガーデン",cat:"自己表現",type:"コミュニティガーデン",addr:"7377 Santa Monica Blvd",lat:34.0907,lng:-118.3503,desc:"コミュニティ × 自立の象徴"},
  {name:"Silicon Beach",jp:"シリコンビーチ",cat:"自己表現",type:"テックハブ",addr:"Santa Monica / Venice",lat:34.0195,lng:-118.4912,desc:"新しい産業が生まれる街"},
  {name:"Tesla Showroom",jp:"テスラ",cat:"自己表現",type:"ショールーム",addr:"930 Hilgard Ave, LA",lat:34.0645,lng:-118.4440,desc:"EV革命とイノベーション"},
  {name:"Beverly Hills Public Library",jp:"BH公共図書館",cat:"教育",type:"図書館",addr:"444 N Rexford Dr, Beverly Hills",lat:34.0735,lng:-118.3960,desc:"誰にでも平等に開かれた空間"},
  {name:"UCLA",jp:"UCLA",cat:"教育",type:"大学",addr:"405 Hilgard Ave, LA",lat:34.0689,lng:-118.4452,desc:"公立トップ大学"},
  {name:"USC",jp:"南カリフォルニア大学",cat:"教育",type:"大学",addr:"LA, CA 90007",lat:34.0224,lng:-118.2851,desc:"起業教育、alumni network"},
  {name:"LA Central Library",jp:"LA中央図書館",cat:"教育",type:"図書館",addr:"630 W 5th St, DTLA",lat:34.0502,lng:-118.2553,desc:"図書館＝教育センター"},
  {name:"California Science Center",jp:"CA科学センター",cat:"教育",type:"科学博物館",addr:"700 Exposition Park Dr, LA",lat:34.0147,lng:-118.2873,desc:"体験型STEAM教育"},
  {name:"Caltech",jp:"カリフォルニア工科大学",cat:"教育",type:"大学",addr:"1200 E California Blvd, Pasadena",lat:34.1377,lng:-118.1253,desc:"世界トップのSTEM大学"},
  {name:"Inner-City Arts",jp:"インナーシティ・アーツ",cat:"教育",type:"アート教育NPO",addr:"720 Kohler St, DTLA",lat:34.0414,lng:-118.2418,desc:"低所得地域の芸術教育"},
  {name:"Homeboy Industries",jp:"ホームボーイ・インダストリーズ",cat:"サステナビリティ・社会貢献",type:"ソーシャルエンタープライズ",addr:"200 N Spring St, DTLA",lat:34.0565,lng:-118.2437,desc:"社会課題をビジネスで解決"},
  {name:"Reformation",jp:"リフォーメーション",cat:"サステナビリティ・社会貢献",type:"サステナブルファッション",addr:"8000 Melrose Ave, LA",lat:34.0837,lng:-118.3660,desc:"透明なサプライチェーン"},
  {name:"Eataly",ise_pick:true,jp:"イータリー（センチュリーシティ）",cat:"ライフスタイル（飲食系）",type:"フード＆ショッピング",addr:"10250 Santa Monica Blvd, Los Angeles, CA 90067",lat:34.0584,lng:-118.4178,desc:"Westfield Century City内のイタリアンフードホール。レストランで食べられる食材が隣のスーパーで全て買える。見るだけで楽しいイタリア輸入商材多数。ラーメン凪の行列も一見の価値あり。"},
  {name:"Community Goods",ise_pick:true,jp:"コミュニティーグッズ",cat:"ライフスタイル（飲食系）",type:"抹茶カフェ",addr:"8709 Santa Monica Blvd, West Hollywood, CA 90069",lat:34.0858,lng:-118.381,desc:"抹茶が世界でどう変化進化しているかを現場で体感。クラウドを飲むとトレンドが分かる。コリアン系がカフェを牽引し、セレブコラボで常に行列。※PDC店が空いている。"},
  {name:"Warabimochi Kamakura",ise_pick:true,jp:"わらび餅 鎌倉",cat:"ライフスタイル（飲食系）",type:"和スイーツ",addr:"333 S Alameda St #315, Los Angeles, CA 90013",lat:34.047,lng:-118.2385,desc:"伊勢さんが経営するわらび餅ショップ。日本の伝統的な味をLAで展開。"},
];

// ── Map ──
const map=L.map('map',{zoomControl:false}).setView([WABH.lat,WABH.lng],12);
// Ensure map renders correctly in flex layout
setTimeout(()=>map.invalidateSize(),100);
L.control.zoom({position:'topleft'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>',maxZoom:20,subdomains:'abcd'}).addTo(map);

function hav(a,b,c,d){const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function mi(k){return(k*.621371).toFixed(1)}
function dt(k){return Math.round(k/30*60)}

// WABH marker
L.marker([WABH.lat,WABH.lng],{icon:L.divIcon({html:'<div class="start-icon">★</div>',className:'',iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map)
  .bindPopup(`<div style="font-size:13px"><b>★ 出発地点: ${WABH.name}</b><br><span style="color:#666">9850 Wilshire Blvd, Beverly Hills, CA 90210</span><br><br><i>Alli Webbセミナー後、ここからNarrative Tripスタート<br>4月25日（土）午後</i></div>`);

// Distance circles
[2,5,10].forEach(km=>{
  const c=km===2?'#27ae60':km===5?'#f39c12':'#e74c3c';
  L.circle([WABH.lat,WABH.lng],{radius:km*1000,fill:false,color:c,weight:1.5,dashArray:'6,4',opacity:.5}).addTo(map);
  const b=45*Math.PI/180,R=6371000,la=WABH.lat*Math.PI/180,lo=WABH.lng*Math.PI/180;
  const la2=Math.asin(Math.sin(la)*Math.cos(km*1000/R)+Math.cos(la)*Math.sin(km*1000/R)*Math.cos(b));
  const lo2=lo+Math.atan2(Math.sin(b)*Math.sin(km*1000/R)*Math.cos(la),Math.cos(km*1000/R)-Math.sin(la)*Math.sin(la2));
  L.marker([la2*180/Math.PI,lo2*180/Math.PI],{icon:L.divIcon({html:`<span style="background:white;padding:1px 5px;border-radius:8px;font-size:10px;font-weight:600;color:${c};border:1px solid ${c}">${km}km/${mi(km)}mi</span>`,className:'',iconSize:[60,16],iconAnchor:[0,8]})}).addTo(map);
});

// Safety layer
const safetyLayer=L.layerGroup();
let safetyOn=false;
safetyZones.forEach(z=>{
  const ratingLabel=z.rating>=5?'⭐ 安全':z.rating>=4?'✅ 概ね安全':z.rating>=3?'⚠️ 普通':z.rating>=2?'🔴 注意':'❌ 危険';
  safetyLayer.addLayer(L.circle([z.lat,z.lng],{
    radius:z.r,fillColor:z.color.replace(/[\d.]+\)$/,'.35)'),fillOpacity:.4,
    color:z.rating>=4?'#27ae60':z.rating>=3?'#f39c12':'#e74c3c',weight:2,opacity:.6
  }).bindPopup(`<div style="font-size:13px"><b>${z.name}</b><br><span style="font-size:16px">${ratingLabel}</span><br><br><span style="color:#555">${z.advice}</span></div>`));
});

// ── Spot markers ──
const layerGroups={};
Object.keys(cats).forEach(c=>{layerGroups[c]=L.layerGroup().addTo(map)});
const active={};Object.keys(cats).forEach(c=>{active[c]=true});
let iseFilter=false;

function makePopup(s,c,d,miles,mins,dl,safetyInfo){
  return `<div style="min-width:220px;font-size:12px">
    <div style="background:${c.color};color:white;padding:5px 10px;margin:-13px -20px 8px;border-radius:4px 4px 0 0;font-weight:600;font-size:11px">${c.icon} ${s.cat}</div>
    ${s.ise_pick?'<div style="background:#FF6B35;color:white;display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:4px">⭐ 伊勢さんおすすめ</div><br>':''}
    <b style="font-size:14px">${s.name}</b><br><span style="color:#888">${s.jp}</span><br>
    <span style="color:#555;font-size:11px">${s.type}</span>
    <div style="background:#f8f9fa;padding:6px 8px;border-radius:5px;margin:6px 0">
      <b>📍 WABHからの距離:</b><br>
      ${d.toFixed(1)}km (${miles}mi) — 車で約${mins}分<br>
      <span style="font-size:11px">${dl}</span>
    </div>
    ${safetyInfo}
    <div style="color:#444;margin-top:4px">${s.desc}</div>
    ${s.addr?`<div style="color:#999;font-size:10px;margin-top:4px">📌 ${s.addr}</div>`:''}
  </div>`;
}

spots.forEach(s=>{
  const c=cats[s.cat];
  const d=hav(WABH.lat,WABH.lng,s.lat,s.lng);
  const miles=mi(d),mins=dt(d);
  const dl=d<1.5?'🟢 徒歩圏内':d<5?'🟡 短い車移動':'🔴 車で移動';
  let safetyInfo='';
  for(const z of safetyZones){
    if(hav(z.lat,z.lng,s.lat,s.lng)<z.r/1000){
      const rl=z.rating>=5?'⭐安全':z.rating>=4?'✅概ね安全':z.rating>=3?'⚠️普通':'🔴注意';
      safetyInfo=`<div style="background:${z.rating>=4?'#E8F5E9':z.rating>=3?'#FFF8E1':'#FFEBEE'};padding:6px 8px;border-radius:5px;margin:4px 0;font-size:11px"><b>安全度: ${rl}</b><br>${z.advice}</div>`;
      break;
    }
  }
  const isIse=s.ise_pick||false;
  const icon=L.divIcon({html:`<div style="position:relative"><div style="background:${c.color};color:white;width:${isIse?28:24}px;height:${isIse?28:24}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${isIse?13:12}px;border:${isIse?'3px solid #FF6B35':'2px solid white'};box-shadow:${isIse?'0 0 0 2px white,0 0 10px rgba(255,107,53,.6),0 2px 6px rgba(0,0,0,.3)':'0 2px 6px rgba(0,0,0,.3)'}">${c.icon}</div>${isIse?'<div class="ise-badge">★</div>':''}</div>`,className:'',iconSize:[isIse?28:24,isIse?28:24],iconAnchor:[isIse?14:12,isIse?14:12]});
  const popup=makePopup(s,c,d,miles,mins,dl,safetyInfo);
  layerGroups[s.cat].addLayer(L.marker([s.lat,s.lng],{icon}).bindPopup(popup));
});

// ── Info panel (closable) ──
function toggleInfo(show){
  const info=document.getElementById('info');
  const btn=document.getElementById('info-reopen');
  if(show){info.classList.remove('hidden');btn.style.display='none'}
  else{info.classList.add('hidden');btn.style.display='block'}
}
const infoEl=document.getElementById('info');
const near=spots.filter(s=>hav(WABH.lat,WABH.lng,s.lat,s.lng)<2).length;
const med=spots.filter(s=>{const d=hav(WABH.lat,WABH.lng,s.lat,s.lng);return d>=2&&d<5}).length;
const far=spots.filter(s=>hav(WABH.lat,WABH.lng,s.lat,s.lng)>=5).length;
infoEl.innerHTML=`<button id="info-close" onclick="toggleInfo(false)">✕</button>
<h3>★ 出発地点: WABH</h3>
<div style="background:#FFF3E0;border:1px solid #FF6B35;border-radius:6px;padding:6px 8px;margin-bottom:8px;font-size:11px"><b style="color:#FF6B35">⭐ 伊勢さんおすすめ: ${spots.filter(s=>s.ise_pick).length}スポット</b></div>
<div style="color:#666;font-size:11px;margin-bottom:6px">Waldorf Astoria Beverly Hills<br>Alli Webbセミナー後 · 4月25日午後</div>
<div class="st"><span>🟢 徒歩圏内 (&lt;2km)</span><b>${near}スポット</b></div>
<div class="st"><span>🟡 短い車移動 (2-5km)</span><b>${med}スポット</b></div>
<div class="st"><span>🔴 車で移動 (5km+)</span><b>${far}スポット</b></div>
<div class="st" style="margin-top:4px"><span><b>合計</b></span><b>${spots.length}スポット</b></div>`;

// ── Filter drawer ──
function openDrawer(){
  document.getElementById('filter-drawer').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('filter-btn').style.display='none';
}
function closeDrawer(){
  document.getElementById('filter-drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('filter-btn').style.display='flex';
}

function applyFilters(){
  Object.keys(layerGroups).forEach(cat=>map.removeLayer(layerGroups[cat]));
  if(iseFilter){
    // Show only Ise picks within active categories
    Object.keys(cats).forEach(cat=>{
      if(!active[cat])return;
      const lg=L.layerGroup();
      layerGroups[cat].eachLayer(l=>{
        const spot=spots.find(s=>s.lat===l.getLatLng().lat&&s.lng===l.getLatLng().lng);
        if(spot&&spot.ise_pick)lg.addLayer(l);
      });
      lg.addTo(map);
    });
  } else {
    Object.keys(cats).forEach(cat=>{if(active[cat])map.addLayer(layerGroups[cat])});
  }
}

// Build drawer content
const body=document.getElementById('drawer-body');

// Ise picks filter
body.innerHTML=`<div style="margin-bottom:16px">
  <div style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px">⭐ おすすめ</div>
  <div class="filter-grid">
    <div class="filter-chip ise" id="chip-ise" onclick="toggleIse()">
      <span>⭐ 伊勢さんおすすめのみ</span>
      <span class="count">${spots.filter(s=>s.ise_pick).length}</span>
    </div>
  </div>
</div>
<div style="margin-bottom:16px">
  <div style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px">📂 カテゴリー</div>
  <div class="filter-grid" id="cat-chips"></div>
</div>
<div>
  <div style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px">🛡️ 安全マップ</div>
  <div class="filter-grid">
    <div class="filter-chip safety" id="chip-safety" onclick="toggleSafety()">
      <span>⚠️ 安全度エリア表示</span>
    </div>
  </div>
</div>`;

const catChips=document.getElementById('cat-chips');
Object.entries(cats).forEach(([cat,cfg])=>{
  const count=spots.filter(s=>s.cat===cat).length;
  const chip=document.createElement('div');
  chip.className='filter-chip active';
  chip.style.setProperty('--chip-color',cfg.color);
  chip.style.setProperty('--chip-bg',cfg.color+'18');
  chip.dataset.cat=cat;
  chip.innerHTML=`<span class="dot" style="background:${cfg.color}"></span><span>${cfg.icon} ${cfg.en}</span><span class="count">${count}</span>`;
  chip.onclick=()=>{
    active[cat]=!active[cat];
    chip.classList.toggle('active',active[cat]);
    chip.classList.toggle('off',!active[cat]);
    applyFilters();
  };
  catChips.appendChild(chip);
});

function toggleIse(){
  iseFilter=!iseFilter;
  const chip=document.getElementById('chip-ise');
  chip.classList.toggle('active',iseFilter);
  applyFilters();
  // Update floating button badge
  document.getElementById('filter-btn').querySelector('.badge').textContent=iseFilter?'⭐ON':'⭐12';
}

function toggleSafety(){
  safetyOn=!safetyOn;
  document.getElementById('chip-safety').classList.toggle('active',safetyOn);
  document.getElementById('safety-legend').style.display=safetyOn?'block':'none';
  safetyOn?map.addLayer(safetyLayer):map.removeLayer(safetyLayer);
}

// Swipe down to close drawer (touch support)
let touchStartY=0;
document.getElementById('filter-drawer').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
document.getElementById('filter-drawer').addEventListener('touchmove',e=>{
  const dy=e.touches[0].clientY-touchStartY;
  if(dy>60)closeDrawer();
},{passive:true});

// Auto-close info panel on mobile after 5 seconds
if(window.innerWidth<=768){
  setTimeout(()=>toggleInfo(false),4000);
}
</script>
</body>
</html>
